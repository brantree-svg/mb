<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MB 브랜드몰 리뉴얼 와이어프레임 (v3 · GNB 간소화)</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css">
<style>
  :root{--ink:#15140f;--mut:#8a8780;--line:#ece9e3;--ph:#e9e6df;--ph2:#e2ded5;--cream:#f6f4ef;--phl:#f2efe9;--pht:#b6b2a8;}
  *{box-sizing:border-box;margin:0;padding:0;}
  html{-webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility;}
  body{font-family:"Pretendard",sans-serif;color:var(--ink);background:#fff;font-size:14px;line-height:1.5;letter-spacing:-0.01em;}
  .tabs{position:sticky;top:0;z-index:9;background:rgba(255,255,255,.9);backdrop-filter:blur(10px);border-bottom:1px solid var(--line);display:flex;align-items:center;gap:2px;padding:0 28px;height:54px;overflow-x:auto;}
  .tabs .brand{font-weight:800;letter-spacing:0.08em;margin-right:22px;font-size:13px;white-space:nowrap;}
  .tabs button{border:0;background:none;font-family:inherit;font-size:12.5px;color:var(--mut);padding:16px 12px;cursor:pointer;white-space:nowrap;letter-spacing:0.02em;border-bottom:2px solid transparent;margin-bottom:-1px;}
  .tabs button.on{color:var(--ink);font-weight:600;border-bottom-color:var(--ink);}
  .tabs .util{margin-left:10px;border:1px solid var(--line)!important;border-radius:20px;padding:7px 14px;font-size:11.5px;color:var(--mut);margin-bottom:0;}
  .tabs .util.on{color:var(--ink);border-color:var(--ink)!important;}
  main{max-width:1060px;margin:0 auto;padding:0 30px 120px;}
  .anim{opacity:0;transform:translateY(12px);animation:up .6s cubic-bezier(.2,.7,.2,1) forwards;}
  @keyframes up{to{opacity:1;transform:none;}}
  .head{padding:34px 0 6px;display:flex;align-items:baseline;gap:14px;}
  .head h1{font-size:22px;font-weight:700;letter-spacing:-0.025em;}
  .head .url{font-size:12px;color:var(--mut);margin-left:auto;}
  .lede{font-size:13px;color:var(--mut);line-height:1.7;padding:0 0 18px;border-bottom:1px solid var(--line);}
  .gnb{display:flex;align-items:center;gap:18px;padding:16px 0;border-bottom:1px solid var(--line);}
  .gnb .lg{font-weight:800;letter-spacing:0.08em;font-size:13px;}
  .gnb .mn{display:flex;gap:14px;font-size:11px;color:var(--mut);letter-spacing:0.03em;flex-wrap:wrap;}
  .gnb .mn .a{color:var(--ink);font-weight:600;}
  .gnb .ut{margin-left:auto;font-size:11px;color:var(--pht);letter-spacing:0.05em;}
  section{padding:30px 0;border-bottom:1px solid var(--line);}
  .sl{display:flex;align-items:baseline;gap:10px;margin-bottom:16px;}
  .sl .i{font-size:11px;color:var(--pht);font-weight:600;min-width:22px;}
  .sl .t{font-size:15px;font-weight:700;letter-spacing:-0.02em;}
  .sl .n{margin-left:auto;font-size:11.5px;color:var(--pht);}
  .ph{background:var(--ph);display:flex;align-items:center;justify-content:center;color:var(--pht);font-size:11px;text-align:center;border-radius:16px;overflow:hidden;}
  .hero{position:relative;border-radius:20px;}
  .hero::after{content:"";position:absolute;inset:0;background:linear-gradient(180deg,rgba(0,0,0,0) 50%,rgba(0,0,0,.22));border-radius:20px;}
  .hero .kick{position:absolute;top:18px;left:20px;z-index:2;font-size:11px;color:#fff;background:rgba(21,20,15,.5);border:1px solid rgba(255,255,255,.35);padding:6px 12px;border-radius:20px;letter-spacing:0.05em;}
  .hero .cap{position:absolute;left:22px;bottom:22px;z-index:2;font-size:20px;font-weight:700;color:#fff;letter-spacing:-0.02em;text-shadow:0 1px 3px rgba(0,0,0,.35);max-width:80%;}
  .g{display:grid;gap:10px;}
  .g2{grid-template-columns:repeat(2,1fr);}.g3{grid-template-columns:repeat(3,1fr);}.g4{grid-template-columns:repeat(4,1fr);}.g5{grid-template-columns:repeat(5,1fr);}.g6{grid-template-columns:repeat(6,1fr);}
  .tile{position:relative;background:var(--ph);border-radius:16px;display:flex;flex-direction:column;align-items:center;justify-content:center;color:#6b6760;font-size:12.5px;font-weight:500;text-align:center;padding:10px;}
  .card{background:#fff;}
  .card .im{background:var(--ph);border-radius:16px;display:flex;align-items:center;justify-content:center;}
  .iml{display:inline-flex;align-items:center;gap:5px;font-size:10.5px;color:var(--pht);letter-spacing:0.02em;line-height:1.3;}
  .iml .ico{display:inline-flex;}
  .iml .ico svg{display:block;}
  .tile small{display:block;margin-top:7px;font-weight:400;}
  .card .c{padding:10px 2px 0;font-size:11px;color:var(--mut);}
  .card .c b{display:block;color:var(--ink);font-weight:600;font-size:12px;margin-bottom:2px;letter-spacing:-0.01em;}
  .stmt{text-align:center;font-size:22px;font-weight:700;letter-spacing:-0.03em;padding:38px 0;}
  .chips{display:flex;flex-wrap:wrap;gap:8px;}
  .chip{font-size:11.5px;color:var(--mut);border:1px solid var(--line);padding:8px 14px;letter-spacing:0.02em;border-radius:20px;background:#fff;}
  .chip.a{color:var(--ink);border-color:var(--ink);}
  .bar{display:flex;align-items:center;gap:14px;font-size:11.5px;color:var(--mut);padding:14px 16px;border:1px solid var(--line);border-radius:14px;letter-spacing:0.02em;background:var(--cream);}
  .bar .r{margin-left:auto;}
  table.tl{width:100%;border-collapse:separate;border-spacing:0;border:1px solid var(--line);border-radius:14px;overflow:hidden;}
  table.tl td{border-bottom:1px solid var(--line);padding:13px 14px;font-size:12px;color:var(--mut);}
  table.tl tr:last-child td{border-bottom:0;}
  table.tl td.k{font-weight:600;color:var(--ink);width:140px;font-size:12px;}
  table.tl tr.h td{background:var(--cream);font-weight:600;color:var(--ink);font-size:11px;letter-spacing:0.04em;text-transform:uppercase;}
  .stl{display:grid;grid-template-columns:1.7fr 1fr;gap:10px;}
  .stl .list{display:flex;flex-direction:column;gap:8px;}
  .stl .bd{background:var(--cream);border:1px solid var(--line);display:flex;align-items:center;justify-content:center;font-size:11.5px;color:var(--mut);flex:1;min-height:54px;border-radius:14px;text-align:center;padding:6px;}
  .foot{padding:28px 0;font-size:10.5px;color:var(--pht);letter-spacing:0.03em;}
  .pgn{display:flex;justify-content:center;gap:10px;padding-top:22px;font-size:11px;color:var(--mut);}
  .pgn span{width:30px;height:30px;display:flex;align-items:center;justify-content:center;border:1px solid var(--line);border-radius:8px;}
  .pgn span.a{border-color:var(--ink);color:var(--ink);}
  .hs{display:flex;gap:14px;overflow-x:auto;scroll-snap-type:x mandatory;padding-bottom:10px;-webkit-overflow-scrolling:touch;}
  .hs::-webkit-scrollbar{height:6px;}
  .hs::-webkit-scrollbar-thumb{background:var(--line);border-radius:3px;}
  .hs::-webkit-scrollbar-track{background:transparent;}
  .hs>.card{flex:0 0 calc((100% - (var(--n) - 1)*14px)/var(--n));scroll-snap-align:start;}
  .fbar{position:sticky;top:0;z-index:6;display:flex;align-items:center;gap:14px;font-size:11.5px;color:var(--mut);padding:14px 16px;border:1px solid var(--line);border-radius:14px;letter-spacing:0.02em;background:var(--cream);margin-bottom:14px;box-shadow:0 2px 12px rgba(0,0,0,0.04);}
  .fbar .r{margin-left:auto;}
  .tnav{position:sticky;top:0;z-index:7;background:var(--cream);padding:12px 0;border-bottom:1px solid var(--line);}
  .scene{margin-bottom:30px;}
  .scmeta{display:flex;align-items:baseline;gap:12px;margin-bottom:12px;padding-bottom:8px;border-bottom:1px solid var(--line);}
  .scmeta .tm{font-size:12px;font-weight:800;color:var(--ink);letter-spacing:0.06em;}
  .scmeta .mo{font-size:13.5px;font-weight:600;color:var(--ink);}
  .scmeta .ds{font-size:11.5px;color:var(--mut);margin-left:auto;text-align:right;}
  .tnav .chip{cursor:pointer;}
  .wdscene{display:none;}
  .wdscene.show{display:block;animation:wdfade .32s ease;}
  @keyframes wdfade{from{opacity:0;transform:translateY(6px);}to{opacity:1;transform:none;}}
  @media(max-width:760px){.hs>.card{flex-basis:calc((100% - 14px)/2);}}
  /* store cards */
  .stcard{border:1px solid var(--line);border-radius:14px;padding:14px;}
  .stcard b{font-size:13px;}
  .stcard .d{font-size:11.5px;color:var(--mut);margin-top:5px;line-height:1.6;}
  .stcard .stk{display:inline-block;margin-top:9px;font-size:10.5px;border:1px solid var(--ink);border-radius:20px;padding:5px 11px;}
  .stscroll{display:flex;gap:12px;overflow-x:auto;scroll-snap-type:x mandatory;padding-bottom:8px;-webkit-overflow-scrolling:touch;}
  .stscroll .stcard{flex:0 0 calc((100% - 24px)/3);min-width:230px;scroll-snap-align:start;}
  .stscroll::-webkit-scrollbar{height:6px;}
  .stscroll::-webkit-scrollbar-thumb{background:var(--line);border-radius:3px;}
  .stscroll::-webkit-scrollbar-track{background:transparent;}
  /* product curation - 착용컷 스토리형 */
  .pcwrap{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;}
  .pc{position:relative;border-radius:16px;overflow:hidden;background:var(--ph);}
  .pc .frames{position:relative;height:400px;}
  .pc .fr{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;color:var(--pht);font-size:11px;text-align:center;background:var(--ph);opacity:0;transition:opacity .4s;}
  .pc .fr:nth-child(1){background:#e9e3d9;}.pc .fr:nth-child(2){background:#dfe4e3;}.pc .fr:nth-child(3){background:#e9e0e2;}.pc .fr:nth-child(4){background:#e2e7df;}
  .pc .fr.show{opacity:1;}
  .pc .bars{position:absolute;top:10px;left:10px;right:10px;z-index:3;display:flex;gap:4px;}
  .pc .bars i{flex:1;height:3px;border-radius:2px;background:rgba(21,20,15,.18);}
  .pc .bars i.on{background:var(--ink);}
  .pc .badge{position:absolute;top:20px;left:12px;z-index:3;background:rgba(21,20,15,.5);color:#fff;font-size:9.5px;letter-spacing:0.04em;padding:4px 9px;border-radius:20px;}
  .pc .navz{position:absolute;top:20px;bottom:66px;width:42%;z-index:2;cursor:pointer;}
  .pc .navz.l{left:0;} .pc .navz.r{right:0;}
  .pc .meta{position:absolute;left:0;right:0;bottom:0;z-index:2;padding:36px 14px 14px;background:linear-gradient(180deg,rgba(0,0,0,0),rgba(0,0,0,.5));color:#fff;transition:opacity .15s;}
  .pc .meta b{display:block;font-size:12.5px;font-weight:600;}
  .pc .meta span{font-size:11.5px;opacity:.92;}
  .pc .qs{position:absolute;left:0;right:0;bottom:0;z-index:4;background:rgba(255,255,255,.98);border-top:1px solid var(--ink);padding:12px;transform:translateY(110%);transition:transform .2s cubic-bezier(.2,.7,.2,1);}
  .pc:hover .qs,.pc.show .qs{transform:translateY(0);}
  .pc:hover .meta,.pc.show .meta{opacity:0;}
  .pc .qs .hlabel{font-size:9.5px;color:var(--pht);letter-spacing:0.06em;text-transform:uppercase;margin-bottom:6px;}
  .pc .qs .opt{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:8px;}
  .pc .qs .opt span{min-width:26px;text-align:center;border:1px solid #d8d4cc;padding:5px 0;font-size:10.5px;color:var(--mut);border-radius:8px;}
  .pc .qs .btns{display:flex;gap:6px;}
  .pc .qs .btns div{flex:1;text-align:center;font-size:11px;padding:9px 0;border:1px solid var(--ink);color:var(--ink);border-radius:10px;}
  .pc .qs .btns .p{background:var(--ink);color:#fff;}
  @media(max-width:760px){
    main{padding:0 18px 80px;}
    .g4,.g5,.g6{grid-template-columns:repeat(2,1fr);}.g3{grid-template-columns:repeat(2,1fr);}
    .stl{grid-template-columns:1fr;}.pcwrap{grid-template-columns:repeat(2,1fr);}.hero .cap{font-size:16px;}
  }
</style>
</head>
<body>
<nav class="tabs" id="tabs"><span class="brand">MINDBRIDGE</span></nav>
<main id="app"></main>

<script>
const MENU = ["SHOP","WORKDAY","MEN","WOMEN","JOURNAL"];
const TABS = ["HOME", ...MENU, "OUTLET"];
const LABEL = {HOME:"홈",SHOP:"쇼핑",WORKDAY:"워크데이",MEN:"남성",WOMEN:"여성",JOURNAL:"저널",OUTLET:"아울렛",STORE:"매장찾기"};

const ph = (h,label="") => `<div class="ph" style="height:${h}px">${label}</div>`;
const ICO_IMG = '<svg viewBox="0 0 24 24" width="11" height="11" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"></rect><circle cx="8.5" cy="8.5" r="1.5"></circle><path d="M21 15l-5-5L4 20"></path></svg>';
const ICO_VID = '<svg viewBox="0 0 24 24" width="11" height="11" fill="currentColor"><path d="M8 5v14l11-7z"></path></svg>';
function imlTag(t){var v=/영상|비디오|video|루프|모션/i.test(t);var i=/이미지|썸네일|룩북|키비주얼|배너|캠페인|매거진|컷|지도|비주얼|사진|화보/i.test(t);var ic="";if(i||!v)ic+='<span class="ico">'+ICO_IMG+'</span>';if(v)ic+='<span class="ico">'+ICO_VID+'</span>';return '<span class="iml">'+ic+'<span>'+t+'</span></span>';}
const hero = (h,cap,kick="",typ="이미지") => `<div class="ph hero" style="height:${h}px">${imlTag(typ)}${kick?`<span class="kick">${kick}</span>`:""}<span class="cap">${cap}</span></div>`;
const grid = (cols,items,h,cap="")=>`<div class="g g${cols}">${items.map(t=>`<div class="tile" style="height:${h}px">${t}${cap?`<small>${imlTag(cap)}</small>`:""}</div>`).join("")}</div>`;
const cards = (cols,items,h,imgl="")=>`<div class="g g${cols}">${items.map(([a,b])=>`<div class="card"><div class="im" style="height:${h}px">${imgl?imlTag(imgl):""}</div><div class="c"><b>${a}</b>${b||""}</div></div>`).join("")}</div>`;
const swipe = (items,h,n,imgl="")=>`<div class="hs" style="--n:${n}">${items.map(([a,b])=>`<div class="card"><div class="im" style="height:${h}px">${imgl?imlTag(imgl):""}</div><div class="c"><b>${a}</b>${b||""}</div></div>`).join("")}</div>`;
const chips = (items,act=-1)=>`<div class="chips">${items.map((t,i)=>`<span class="chip${i===act?' a':''}">${t}</span>`).join("")}</div>`;
const stmt = t=>`<div class="stmt">${t}</div>`;
const tile = (t,h)=>`<div class="tile" style="height:${h}px;font-size:15px;font-weight:700">${t.split("\n").map((ln,i)=>i?`<small>${imlTag(ln)}</small>`:ln).join("")}</div>`;
const split = (l,r,h)=>`<div class="g g2">${tile(l,h)}${tile(r,h)}</div>`;
const stl = (left,bands,h)=>`<div class="stl">${ph(h,left)}<div class="list">${bands.map(b=>`<div class="bd">${b}</div>`).join("")}</div></div>`;
const scene = (tm,mo,ds,imgl,picks,h=380)=>`<div class="scene"><div class="scmeta"><span class="tm">${tm}</span><span class="mo">${mo}</span><span class="ds">${ds}</span></div>${stl(imlTag(imgl),picks,h)}</div>`;
const WD_MOMENTS = [
  {c:"07:00 출근", tm:"07:00", mo:"출근 준비", ds:"하루를 여는 기본기<br>셋업과 셔츠", img:"출근룩 룩북 컷 / 영상", picks:["자켓 ₩ —","셔츠 ₩ —","슬랙스 ₩ —","이 룩 쇼핑하기 →"]},
  {c:"08:00 이동", tm:"08:00", mo:"이동", ds:"가볍고 구김 없는<br>이지 셋업", img:"이동룩 룩북 이미지", picks:["블루종 ₩ —","니트 ₩ —","치노 ₩ —","이 룩 쇼핑하기 →"]},
  {c:"10:00 업무", tm:"10:00", mo:"업무", ds:"오래 입어도 편한<br>데일리 워크웨어", img:"업무룩 룩북 이미지", picks:["가디건 ₩ —","셔츠 ₩ —","슬랙스 ₩ —","이 룩 쇼핑하기 →"]},
  {c:"14:00 미팅", tm:"14:00", mo:"미팅", ds:"무게감 있는 인상<br>셋업 코디", img:"미팅룩 룩북 컷 / 영상", picks:["셋업 자켓 ₩ —","셔츠 ₩ —","팬츠 ₩ —","이 룩 쇼핑하기 →"]},
  {c:"19:00 퇴근 후", tm:"19:00", mo:"퇴근 후", ds:"긴장을 푸는 캐주얼<br>니트와 데님", img:"퇴근 후 룩북 이미지", picks:["니트 ₩ —","데님 ₩ —","스니커즈 ₩ —","이 룩 쇼핑하기 →"]},
  {c:"주말", tm:"주말", mo:"오프 듀티", ds:"한 끗 다른<br>주말 캐주얼", img:"주말룩 룩북 이미지", picks:["후드 ₩ —","조거 ₩ —","스니커즈 ₩ —","이 룩 쇼핑하기 →"]},
];
function wdTimeline(active=0){
  const chips = WD_MOMENTS.map((m,i)=>`<span class="chip${i===active?' a':''}" onclick="wdPick(${i})">${m.c}</span>`).join("");
  const scenes = WD_MOMENTS.map((m,i)=>`<div class="wdscene${i===active?' show':''}" data-i="${i}">${scene(m.tm,m.mo,m.ds,m.img,m.picks)}</div>`).join("");
  return `<div class="todaylook"><div class="tnav"><div class="chips">${chips}</div></div>${scenes}</div>`;
}
function wdPick(i){
  const root = document.querySelector(".todaylook"); if(!root) return;
  root.querySelectorAll(".tnav .chip").forEach((c,j)=>c.classList.toggle("a", j===i));
  root.querySelectorAll(".wdscene").forEach(sc=>sc.classList.toggle("show", Number(sc.dataset.i)===i));
}
function sec(i,t,n,inner){return `<section class="anim"><div class="sl"><span class="i">${i}</span><span class="t">${t}</span>${n?`<span class="n">${n}</span>`:""}</div>${inner}</section>`;}
function gnb(active){
  const m = ["HOME",...MENU,"OUTLET"].map(x=>`<span class="${x===active?'a':''}">${LABEL[x]||x}${x==="OUTLET"?" ↗":""}</span>`).join("");
  return `<div class="gnb"><span class="lg">MINDBRIDGE</span><div class="mn">${m}</div><span class="ut">검색 · 매장 · 마이 · 장바구니</span></div>`;
}
const foot = `<div class="foot">푸터 · 통합몰(TBH SHOP) 공통 — 회사소개 · 약관 · 개인정보 · 고객센터 · 매장찾기 · SNS</div>`;
const newrow = cards(4,[["신상품 01","₩ 00,000"],["신상품 02","₩ 00,000"],["신상품 03","₩ 00,000"],["신상품 04","₩ 00,000"]],260,"상품 썸네일");

const P = {};

P.HOME = {url:"/",lede:"브랜드 톤앤무드를 보여주는 비주얼 중심 메인.",
  body:

/* render */
const tabsEl = document.getElementById("tabs");
TABS.forEach((m)=>{
  const b=document.createElement("button");
  b.textContent=(LABEL[m]||m)+(m==="OUTLET"?" ↗":""); b.dataset.k=m;
  b.onclick=()=>show(m);
  tabsEl.appendChild(b);
});
const storeBtn=document.createElement("button");
storeBtn.className="util"; storeBtn.dataset.k="STORE"; storeBtn.textContent="매장찾기";
storeBtn.onclick=()=>show("STORE");
tabsEl.appendChild(storeBtn);
const app=document.getElementById("app");
function show(k){
  const d=P[k];
  app.innerHTML =
    `<div class="head"><h1>${LABEL[k]||k}</h1><span class="url">mindbridge.tbhshop.co.kr${d.url}</span></div>`+
    `<div class="lede">${d.lede}</div>`+
    gnb(k)+ d.body;
  initPC();
  [...tabsEl.querySelectorAll("button")].forEach(b=>b.classList.toggle("on",b.dataset.k===k));
  window.scrollTo({top:0,behavior:"smooth"});
}
function initPC(){
  document.querySelectorAll(".pc").forEach(pc=>{
    const frs=[...pc.querySelectorAll(".fr")], bars=[...pc.querySelectorAll(".bars i")];
    if(!frs.length) return;
    let idx=0,t=null;
    const set=n=>{idx=(n+frs.length)%frs.length;frs.forEach((f,i)=>f.classList.toggle("show",i===idx));bars.forEach((b,i)=>b.classList.toggle("on",i<=idx));};
    pc.addEventListener("mouseenter",()=>{clearInterval(t);t=setInterval(()=>set(idx+1),1100);});
    pc.addEventListener("mouseleave",()=>{clearInterval(t);set(0);});
    const l=pc.querySelector(".navz.l"),r=pc.querySelector(".navz.r");
    if(l)l.onclick=e=>{e.stopPropagation();set(idx-1);};
    if(r)r.onclick=e=>{e.stopPropagation();set(idx+1);};
    set(0);
  });
  const demo=document.querySelector(".pc.show");
  if(demo){const f=[...demo.querySelectorAll(".fr")],bb=[...demo.querySelectorAll(".bars i")];if(f[1]){f.forEach((x,i)=>x.classList.toggle("show",i===1));bb.forEach((x,i)=>x.classList.toggle("on",i<=1));}}
}
show("HOME");
</script>
